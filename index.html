<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Midgard Barter Ledger</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-950 text-white">

    <div id="admin-test-area" style="margin-top: 20px; padding: 10px; border: 1px solid red; display: none;">
        <h3 style="color: white;">Admin Control Panel</h3>
        <button onclick="loadAdminPanel()" style="background: green; color: white; padding: 5px;">Load Pending Suggestions</button>
        <div id="adminPanel" style="color: white; margin-top: 10px;"></div>
    </div>

    <div id="app" class="p-4 lg:p-6 max-w-7xl mx-auto">
        <div id="loadingOverlay" class="fixed inset-0 bg-gray-900/80 z-50 flex items-center justify-center hidden">
            <div class="text-center">
                <div class="text-amber-400 text-2xl font-bold mb-2">Loading prices...</div>
                <div class="text-gray-400 text-sm">Fetching from database</div>
            </div>
        </div>

        <div class="mb-6 flex items-center gap-4">
            <label class="text-gray-400 font-semibold">Server:</label>
            <select id="serverSelector" class="bg-gray-800 border border-gray-600 text-white rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-amber-500"></select>
            <button onclick="openSuggestionModal()" class="ml-auto bg-amber-600 hover:bg-amber-500 text-white font-bold px-4 py-2 rounded-lg transition">
                Suggest Price Change
            </button>
        </div>

        <button onclick="document.getElementById('admin-test-area').style.display='block'" class="opacity-10 hover:opacity-100 text-[10px] text-gray-500">...</button>
        
        <div id="suggestionModal" class="fixed inset-0 bg-gray-900/90 z-50 flex items-center justify-center hidden">
            <div class="bg-gray-800 border border-gray-700 rounded-xl p-8 w-full max-w-md shadow-2xl">
                <h2 class="text-2xl font-bold gold-text mb-6">Suggest a Price Change</h2>
                <form id="suggestionForm" onsubmit="return false;">
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-400 mb-1">Item Name</label>
                        <input type="text" id="suggestItemName" placeholder="Exact item name..." class="w-full p-2 bg-gray-700 border border-gray-600 rounded-md text-sm">
                    </div>
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-400 mb-1">Suggested Price (LS)</label>
                        <input type="number" id="suggestPrice" step="0.01" class="w-full p-2 bg-gray-700 border border-gray-600 rounded-md text-sm">
                    </div>
                    <p id="suggestionStatus" class="text-sm mt-2"></p>
                    <div class="flex gap-4 mt-6">
                        <button onclick="submitSuggestion()" class="flex-1 py-2 bg-amber-600 text-white font-bold rounded-lg">Submit</button>
                        <button onclick="closeSuggestionModal()" class="flex-1 py-2 bg-gray-700 text-white font-bold rounded-lg">Cancel</button>
                    </div>
                </form>
            </div>
        </div>

        <div id="trade-agreement" class="lg:grid lg:grid-cols-2 lg:gap-8 mb-8">
            <div id="your-offer-panel" class="bg-gray-800 p-6 rounded-xl border border-gray-700 mb-8 lg:mb-0">
                <h2 class="text-3xl font-extrabold mb-4 gold-text border-b pb-2">YOUR OFFER</h2>
                <div id="offerSlots" class="space-y-6"></div>
                <button id="addOfferSlot" class="w-full mt-6 py-3 bg-blue-600 rounded-lg font-bold text-white">Add Item</button>
            </div>

            <div id="their-offer-panel" class="bg-gray-800 p-6 rounded-xl border border-gray-700">
                <h2 class="text-3xl font-extrabold mb-4 gold-text border-b pb-2">THEIR OFFER</h2>
                <input type="text" id="targetSearch" placeholder="Search item..." class="w-full p-2 mb-2 bg-gray-700 rounded-md">
                <div id="targetSearchResults" class="hidden"></div>
                <div id="targetItemNameDisplay">None</div>
                <div id="targetGearControls" class="hidden">...</div>
            </div>
        </div>

        <div id="verdict-section" class="bg-gray-900/50 p-6 rounded-xl border border-gray-700 space-y-6">
            <div id="tradeVerdict" class="text-center">Waiting for input...</div>
            <div id="tradeSuggestion">Awaiting calculation...</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
